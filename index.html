<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheel Challenge Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top, rgba(59,130,246,0.25), transparent 40%),
        radial-gradient(circle at bottom, rgba(168,85,247,0.2), transparent 40%),
        #050816;
      color: white;
      font-family: Inter, Arial, sans-serif;
    }
    .glass {
      background: rgba(15,23,42,0.75);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }
    .wheel-wrapper {
      position: relative;
      width: 640px;
      height: 640px;
      max-width: 92vw;
      max-height: 92vw;
    }
    #wheelSvg {
      width: 100%;
      height: 100%;
      transition: transform 5s cubic-bezier(0.15, 0.8, 0.2, 1);
      filter: drop-shadow(0 0 40px rgba(0,0,0,0.5));
    }
    .pointer {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 28px solid transparent;
      border-right: 28px solid transparent;
      border-top: 54px solid #facc15;
      z-index: 10;
    }
  </style>
</head>
<body class="text-white min-h-screen p-6">
  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col lg:flex-row gap-8">
      <div class="flex-1 flex flex-col items-center">
        <h1 class="text-6xl font-black mb-2 tracking-tight text-center">
          WHEEL CHALLENGE
        </h1>

        <p class="text-zinc-400 mb-10 text-xl text-center">
          Profesjonalna imprezowa gra webowa
        </p>

        <div class="wheel-wrapper mb-10">
          <div class="pointer"></div>
          <svg id="wheelSvg" viewBox="0 0 600 600"></svg>
        </div>

        <button
          id="spinBtn"
          class="bg-yellow-400 hover:scale-105 transition text-black px-10 py-5 rounded-2xl text-2xl font-black shadow-2xl"
        >
          ZAKRĘĆ KOŁEM
        </button>

        <div
          id="resultBox"
          class="hidden mt-10 bg-zinc-900 border border-zinc-700 rounded-3xl p-8 max-w-2xl w-full text-center shadow-2xl"
        >
          <div class="uppercase tracking-[0.3em] text-yellow-400 text-sm mb-3">
            Wylosowano
          </div>

          <h2 id="challengeText" class="text-4xl font-black mb-4"></h2>

          <div id="challengePoints" class="text-2xl text-green-400 font-bold mb-6"></div>

          <div class="flex justify-center gap-4 flex-wrap">
            <button
              onclick="startTimer()"
              class="bg-blue-500 px-6 py-3 rounded-xl font-bold"
            >
              Start timer
            </button>

            <button
              onclick="completeChallenge()"
              class="bg-green-500 px-6 py-3 rounded-xl font-bold"
            >
              Zadanie wykonane
            </button>

            <button
              onclick="nextPlayer()"
              class="bg-red-500 px-6 py-3 rounded-xl font-bold"
            >
              Pomiń
            </button>
          </div>
        </div>
      </div>

      <div class="w-full lg:w-[380px] flex flex-col gap-6">
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 shadow-2xl">
          <div class="flex items-center justify-between mb-5">
            <h2 class="text-2xl font-black">Gracze</h2>

            <button
              onclick="addPlayer()"
              class="bg-white text-black px-4 py-2 rounded-xl font-bold"
            >
              + Dodaj
            </button>
          </div>

          <div id="players"></div>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 shadow-2xl text-center">
          <h2 class="text-2xl font-black mb-5">Timer</h2>

          <div id="timer" class="text-7xl font-black text-yellow-400 mb-4">
            30
          </div>

          <div class="w-full h-4 bg-zinc-800 rounded-full overflow-hidden">
            <div
              id="timerBar"
              class="h-full bg-yellow-400 transition-all"
              style="width:100%"
            ></div>
          </div>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 shadow-2xl">
          <h2 class="text-2xl font-black mb-5">Dodaj zadanie</h2>

          <div class="space-y-3">
            <input
              id="newTask"
              placeholder="Nowe zadanie"
              class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 outline-none"
            />

            <input
              id="newPoints"
              type="number"
              value="100"
              class="w-full bg-zinc-800 border border-zinc-700 rounded-xl p-3 outline-none"
            />

            <button
              onclick="addTask()"
              class="w-full bg-purple-500 rounded-xl p-3 font-black"
            >
              Dodaj zadanie
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const wheel = document.getElementById('wheelSvg');
    const spinBtn = document.getElementById('spinBtn');
    const resultBox = document.getElementById('resultBox');
    const challengeText = document.getElementById('challengeText');
    const challengePoints = document.getElementById('challengePoints');
    const playersBox = document.getElementById('players');

    let rotation = 0;
    let spinning = false;
    let currentPlayer = 0;
    let timerInterval;

    const colors = [
      '#ef4444',
      '#3b82f6',
      '#22c55e',
      '#f59e0b',
      '#a855f7',
      '#ec4899',
      '#06b6d4',
      '#84cc16'
    ];

    let tasks = [
      { text: '20 przysiadów', points: 200 },
      { text: 'Zaśpiewaj piosenkę', points: 300 },
      { text: 'Taniec 30 sekund', points: 400 },
      { text: 'Powiedz żart', points: 250 },
      { text: '+500 punktów', points: 500 },
      { text: 'Wyzwanie drużynowe', points: 350 },
      { text: 'Mów szeptem minutę', points: 150 }
    ];

    let players = [
      { name: 'Gracz 1', score: 0 },
      { name: 'Gracz 2', score: 0 }
    ];

    function renderPlayers() {
      playersBox.innerHTML = '';

      players.forEach((player, index) => {
        const div = document.createElement('div');

        div.className = `rounded-2xl p-4 border mb-3 ${
          currentPlayer === index
            ? 'border-yellow-400 bg-yellow-400/10'
            : 'border-zinc-700 bg-zinc-800'
        }`;

        div.innerHTML = `
          <input
            value="${player.name}"
            onchange="players[${index}].name=this.value"
            class="bg-transparent outline-none text-xl font-bold w-full"
          />

          <div class="text-3xl font-black text-green-400 mt-2">
            ${player.score}
          </div>
        `;

        playersBox.appendChild(div);
      });
    }

    function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
      const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
      return {
        x: centerX + radius * Math.cos(angleInRadians),
        y: centerY + radius * Math.sin(angleInRadians)
      };
    }

    function describeArc(x, y, radius, startAngle, endAngle) {
      const start = polarToCartesian(x, y, radius, endAngle);
      const end = polarToCartesian(x, y, radius, startAngle);
      const largeArcFlag = endAngle - startAngle <= 180 ? '0' : '1';

      return [
        'M', x, y,
        'L', start.x, start.y,
        'A', radius, radius, 0, largeArcFlag, 0, end.x, end.y,
        'Z'
      ].join(' ');
    }

    function renderWheel() {
      wheel.innerHTML = '';

      const slice = 360 / tasks.length;
      const radius = 300;

      tasks.forEach((task, index) => {
        const startAngle = index * slice;
        const endAngle = startAngle + slice;
        const midAngle = startAngle + slice / 2;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', describeArc(300, 300, radius, startAngle, endAngle));
        path.setAttribute('fill', colors[index % colors.length]);
        path.setAttribute('stroke', '#0f172a');
        path.setAttribute('stroke-width', '4');
        wheel.appendChild(path);

        const textPos = polarToCartesian(300, 300, 190, midAngle);

        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', textPos.x);
        text.setAttribute('y', textPos.y);
        text.setAttribute('fill', 'white');
        text.setAttribute('font-size', '18');
        text.setAttribute('font-weight', '900');
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'middle');
        text.setAttribute('transform', `rotate(${midAngle}, ${textPos.x}, ${textPos.y})`);

        const maxLength = 18;
        text.textContent = task.text.length > maxLength
          ? task.text.slice(0, maxLength) + '…'
          : task.text;

        wheel.appendChild(text);
      });

      const center = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      center.setAttribute('cx', '300');
      center.setAttribute('cy', '300');
      center.setAttribute('r', '46');
      center.setAttribute('fill', '#020617');
      center.setAttribute('stroke', '#facc15');
      center.setAttribute('stroke-width', '6');
      wheel.appendChild(center);
    }

    function spinWheel() {
      if (spinning) return;

      spinning = true;
      resultBox.classList.add('hidden');

      const randomIndex = Math.floor(Math.random() * tasks.length);
      const slice = 360 / tasks.length;

      const targetAngle = randomIndex * slice + slice / 2;
      const normalizedTarget = 360 - targetAngle;
      rotation = Math.round(rotation / 360) * 360;
      rotation += 360 * 7 + normalizedTarget;

      wheel.style.transform = `rotate(${rotation}deg)`;

      setTimeout(() => {
        const task = tasks[randomIndex];

        challengeText.innerText = tasks[randomIndex].text;
        challengePoints.innerText = `${tasks[randomIndex].points > 0 ? '+' : ''}${tasks[randomIndex].points} punktów`;

        resultBox.classList.remove('hidden');

        window.currentTask = task;
        spinning = false;
      }, 5000);
    }

    function completeChallenge() {
      players[currentPlayer].score += window.currentTask.points;
      renderPlayers();
      nextPlayer();
    }

    function nextPlayer() {
      currentPlayer = (currentPlayer + 1) % players.length;
      renderPlayers();
    }

    function addPlayer() {
      players.push({
        name: `Gracz ${players.length + 1}`,
        score: 0
      });

      renderPlayers();
    }

    function addTask() {
      const text = document.getElementById('newTask').value;
      const points = Number(document.getElementById('newPoints').value);

      if (!text.trim()) return;

      tasks.push({ text, points });

      document.getElementById('newTask').value = '';
      renderWheel();
    }

    function startTimer() {
      let time = 30;
      const timer = document.getElementById('timer');
      const bar = document.getElementById('timerBar');

      clearInterval(timerInterval);

      timerInterval = setInterval(() => {
        time--;

        timer.innerText = time;
        bar.style.width = `${(time / 30) * 100}%`;

        if (time <= 0) {
          clearInterval(timerInterval);
        }
      }, 1000);
    }

    spinBtn.addEventListener('click', spinWheel);

    renderWheel();
    renderPlayers();
  </script>
</body>
</html>

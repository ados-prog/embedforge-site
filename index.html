<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheel Challenge Pro</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <h1>WHEEL CHALLENGE</h1>
  <p class="subtitle">
    Profesjonalna imprezowa gra webowa<br>
    <span>wersja: 0.9.0</span>
  </p>

  <div class="wheel-wrapper">
    <div class="pointer"></div>
    <svg id="wheelSvg" viewBox="0 0 600 600"></svg>
  </div>

  <button id="spinBtn" class="spin-btn">ZAKRĘĆ KOŁEM</button>

  <div id="animationModal" class="hidden modal">
    <div class="modal-content glass">
      <button onclick="closeAnimationModal()" class="close-btn">✕</button>
      <h2 id="modalTaskTitle"></h2>
      <img id="modalGif" src="" alt="challenge gif">
      <button onclick="startTimer()" class="timer-btn">START TIMERA</button>
      <div id="timer">30</div>
    </div>
  </div>

</div>

<script src="js/tasks.js"></script>
<script src="js/modal.js"></script>
<script src="js/timer.js"></script>
<script src="js/wheel.js"></script>
<script src="js/app.js"></script>
</body>
</html>
